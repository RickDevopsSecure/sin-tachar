<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Una figura humana sola frente a un muro de datos con una casilla marcada denegado">
  <defs>
    <style>.mono { font-family: "Courier New", ui-monospace, monospace; }</style>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="900" fill="#16140f"/>

  <!-- Encabezado -->
  <text x="70" y="86" class="mono" font-size="17" letter-spacing="3" fill="#8a8377">SOLICITUD DE ASISTENCIA · DECISIÓN AUTOMATIZADA</text>
  <rect x="70" y="104" width="1060" height="1" fill="#8a8377" opacity="0.5"/>

  <!-- Muro de datos (rejilla de celdas) -->
  <g>
    <!-- filas -->
    <g fill="none" stroke="#cbc2b0" stroke-width="1.5" opacity="0.42">
      <!-- generamos 9x6 celdas -->
      <!-- fila 1 -->
      <rect x="440" y="170" width="66" height="80"/><rect x="516" y="170" width="66" height="80"/><rect x="592" y="170" width="66" height="80"/><rect x="668" y="170" width="66" height="80"/><rect x="744" y="170" width="66" height="80"/><rect x="820" y="170" width="66" height="80"/><rect x="896" y="170" width="66" height="80"/><rect x="972" y="170" width="66" height="80"/><rect x="1048" y="170" width="66" height="80"/>
      <!-- fila 2 -->
      <rect x="440" y="260" width="66" height="80"/><rect x="516" y="260" width="66" height="80"/><rect x="592" y="260" width="66" height="80"/><rect x="668" y="260" width="66" height="80"/><rect x="744" y="260" width="66" height="80"/><rect x="820" y="260" width="66" height="80"/><rect x="896" y="260" width="66" height="80"/><rect x="972" y="260" width="66" height="80"/><rect x="1048" y="260" width="66" height="80"/>
      <!-- fila 3 -->
      <rect x="440" y="350" width="66" height="80"/><rect x="516" y="350" width="66" height="80"/><rect x="592" y="350" width="66" height="80"/><rect x="668" y="350" width="66" height="80"/><rect x="744" y="350" width="66" height="80"/><rect x="820" y="350" width="66" height="80"/><rect x="896" y="350" width="66" height="80"/><rect x="972" y="350" width="66" height="80"/><rect x="1048" y="350" width="66" height="80"/>
      <!-- fila 4 -->
      <rect x="440" y="440" width="66" height="80"/><rect x="516" y="440" width="66" height="80"/><rect x="592" y="440" width="66" height="80"/><rect x="668" y="440" width="66" height="80"/><rect x="744" y="440" width="66" height="80"/><rect x="820" y="440" width="66" height="80"/><rect x="896" y="440" width="66" height="80"/><rect x="972" y="440" width="66" height="80"/><rect x="1048" y="440" width="66" height="80"/>
      <!-- fila 5 -->
      <rect x="440" y="530" width="66" height="80"/><rect x="516" y="530" width="66" height="80"/><rect x="592" y="530" width="66" height="80"/><rect x="668" y="530" width="66" height="80"/><rect x="744" y="530" width="66" height="80"/><rect x="820" y="530" width="66" height="80"/><rect x="896" y="530" width="66" height="80"/><rect x="972" y="530" width="66" height="80"/><rect x="1048" y="530" width="66" height="80"/>
      <!-- fila 6 -->
      <rect x="440" y="620" width="66" height="80"/><rect x="516" y="620" width="66" height="80"/><rect x="592" y="620" width="66" height="80"/><rect x="668" y="620" width="66" height="80"/><rect x="744" y="620" width="66" height="80"/><rect x="820" y="620" width="66" height="80"/><rect x="896" y="620" width="66" height="80"/><rect x="972" y="620" width="66" height="80"/><rect x="1048" y="620" width="66" height="80"/>
    </g>

    <!-- pequeñas "lecturas" de datos dentro de algunas celdas -->
    <g fill="#cbc2b0" opacity="0.3">
      <rect x="452" y="205" width="42" height="8"/><rect x="604" y="205" width="30" height="8"/><rect x="756" y="205" width="40" height="8"/><rect x="908" y="205" width="24" height="8"/>
      <rect x="528" y="295" width="34" height="8"/><rect x="680" y="295" width="44" height="8"/><rect x="984" y="295" width="30" height="8"/>
      <rect x="452" y="385" width="40" height="8"/><rect x="832" y="385" width="34" height="8"/><rect x="1060" y="385" width="28" height="8"/>
      <rect x="604" y="565" width="42" height="8"/><rect x="908" y="565" width="30" height="8"/>
      <rect x="528" y="655" width="36" height="8"/><rect x="756" y="655" width="44" height="8"/>
    </g>

    <!-- celda marcada + sello DENEGADO -->
    <rect x="668" y="440" width="66" height="80" fill="#b5352a" opacity="0.9"/>
    <g stroke="#b5352a" stroke-width="4" stroke-linecap="round">
      <line x1="684" y1="456" x2="718" y2="504"/><line x1="718" y1="456" x2="684" y2="504"/>
    </g>
    <g transform="rotate(-6 800 480)">
      <rect x="700" y="452" width="200" height="56" fill="none" stroke="#b5352a" stroke-width="3" rx="3"/>
      <text x="800" y="489" class="mono" font-size="24" letter-spacing="4" fill="#b5352a" text-anchor="middle">DENEGADO</text>
    </g>
  </g>

  <!-- Divisoria humano / máquina -->
  <line x1="360" y1="150" x2="360" y2="740" stroke="#8a8377" stroke-width="1.5" opacity="0.4"/>

  <!-- Figura humana sola (escala frente al muro) -->
  <g fill="#e8e0ce">
    <ellipse cx="205" cy="640" rx="90" ry="14" fill="#000" opacity="0.18"/>
    <circle cx="205" cy="415" r="34"/>
    <path d="M150 640 C150 540 165 470 205 470 C245 470 260 540 260 640 Z"/>
  </g>

  <!-- Pie -->
  <text x="70" y="820" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">EXPEDIENTE · SIN REVISIÓN HUMANA · EL ALGORITMO NO PASA HAMBRE</text>
</svg>
