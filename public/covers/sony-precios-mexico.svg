<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Ticket con el tipo de cambio de Sony 20.50 frente al de mercado 17.40">
  <defs><style>.mono{font-family:"Courier New",ui-monospace,monospace;}.serif{font-family:Georgia,"Times New Roman",serif;}</style></defs>

  <rect width="1200" height="900" fill="#16140f"/>
  <text x="70" y="92" class="mono" font-size="16" letter-spacing="3" fill="#8a8377">PLAYSTATION MÉXICO · TIPO DE CAMBIO · EXPEDIENTE</text>
  <rect x="70" y="110" width="1060" height="1" fill="#8a8377" opacity="0.5"/>

  <!-- Ticket / recibo (papel) -->
  <g>
    <rect x="270" y="200" width="660" height="470" fill="#e8e0ce"/>
    <!-- dientes del ticket abajo -->
    <g fill="#16140f">
      <path d="M270 670 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 l33 -26 l33 26 v40 h-660 z"/>
    </g>

    <text x="310" y="262" class="mono" font-size="18" letter-spacing="2" fill="#4a443a">RECIBO · PS STORE MX</text>
    <line x1="310" y1="284" x2="890" y2="284" stroke="#c9bda3" stroke-width="2"/>

    <text x="310" y="336" class="mono" font-size="19" fill="#4a443a">TIPO DE CAMBIO SONY</text>
    <text x="310" y="430" class="serif" font-size="96" font-weight="700" fill="#16130e">$20.50 MXN</text>

    <text x="310" y="500" class="mono" font-size="19" fill="#4a443a">MERCADO (BANXICO) ≈ $17.40</text>
    <line x1="308" y1="492" x2="740" y2="492" stroke="#b5352a" stroke-width="3"/>

    <text x="310" y="560" class="mono" font-size="19" fill="#4a443a">SOBREPRECIO IMPLÍCITO ≈ +17%</text>
    <text x="310" y="616" class="mono" font-size="14" fill="#8a8377">IVA: ¿INCLUIDO? · SONY NO LO ACLARA</text>
  </g>

  <!-- Sello -->
  <g transform="rotate(-8 830 300)">
    <rect x="720" y="266" width="230" height="62" fill="none" stroke="#b5352a" stroke-width="3" rx="3"/>
    <text x="835" y="306" class="mono" font-size="24" letter-spacing="3" fill="#b5352a" text-anchor="middle">SOBREPRECIO</text>
  </g>

  <text x="70" y="820" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">EL DÓLAR DE SONY VIVE EN OTRO MERCADO</text>
</svg>
