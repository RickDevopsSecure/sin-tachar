<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Paisaje al amanecer con un marcador de memoria en la tierra">
  <defs>
    <style>.mono{font-family:"Courier New",ui-monospace,monospace;}</style>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211d18"/>
      <stop offset="0.7" stop-color="#3a342b"/>
      <stop offset="1" stop-color="#4f473a"/>
    </linearGradient>
  </defs>

  <!-- Cielo del amanecer -->
  <rect width="1200" height="640" fill="url(#sky)"/>
  <!-- Sol bajo -->
  <circle cx="850" cy="470" r="120" fill="#cbc2b0" opacity="0.35"/>
  <circle cx="850" cy="470" r="70" fill="#e8e0ce" opacity="0.4"/>

  <text x="70" y="86" class="mono" font-size="16" letter-spacing="3" fill="#cbc2b0" opacity="0.75">DERECHOS HUMANOS · AMÉRICA LATINA · EXPEDIENTE</text>

  <!-- Laderas -->
  <path d="M0 560 Q 300 470 620 540 T 1200 500 L1200 640 L0 640 Z" fill="#2c2820" opacity="0.85"/>
  <path d="M0 640 Q 360 560 760 620 T 1200 590 L1200 900 L0 900 Z" fill="#1c1913"/>
  <path d="M0 740 Q 420 690 820 730 T 1200 710 L1200 900 L0 900 Z" fill="#14110c"/>

  <!-- Árbol solitario -->
  <g fill="#14110c">
    <rect x="252" y="470" width="10" height="95"/>
    <path d="M257 400 C 205 405, 195 470, 257 475 C 320 470, 310 405, 257 400 Z"/>
  </g>

  <!-- Marcador de memoria (estaca + tabla pintada a mano) -->
  <g>
    <rect x="905" y="640" width="12" height="150" fill="#0e0c08"/>
    <g transform="rotate(-4 950 660)">
      <rect x="852" y="628" width="200" height="70" fill="#d7cbb2"/>
      <rect x="852" y="628" width="200" height="70" fill="none" stroke="#0e0c08" stroke-width="2"/>
      <text x="952" y="660" class="mono" font-size="20" letter-spacing="2" fill="#2c2620" text-anchor="middle">AL MENOS</text>
      <text x="952" y="686" class="mono" font-size="24" letter-spacing="3" fill="#8a2b22" text-anchor="middle">358 · 2025</text>
    </g>
  </g>

  <text x="70" y="852" class="mono" font-size="15" letter-spacing="2" fill="#cbc2b0" opacity="0.8">QUIENES CUIDAN LA TIERRA · NO OLVIDAR</text>
</svg>
