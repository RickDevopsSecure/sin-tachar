<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Gráfica de ingresos en ascenso frente a una silla de oficina vacía">
  <defs><style>.mono{font-family:"Courier New",ui-monospace,monospace;}</style></defs>

  <rect width="1200" height="900" fill="#16140f"/>

  <text x="70" y="92" class="mono" font-size="16" letter-spacing="3" fill="#8a8377">INDUSTRIA DEL VIDEOJUEGO · NÓMINA · EXPEDIENTE</text>
  <rect x="70" y="110" width="1060" height="1" fill="#8a8377" opacity="0.5"/>

  <!-- Gráfica de ingresos (ascendente) -->
  <g>
    <line x1="470" y1="650" x2="1120" y2="650" stroke="#8a8377" stroke-width="1.5" opacity="0.5"/>
    <g fill="#cbc2b0" opacity="0.42">
      <rect x="500" y="590" width="52" height="60"/>
      <rect x="580" y="540" width="52" height="110"/>
      <rect x="660" y="500" width="52" height="150"/>
      <rect x="740" y="520" width="52" height="130"/>
      <rect x="820" y="440" width="52" height="210"/>
      <rect x="900" y="390" width="52" height="260"/>
      <rect x="980" y="350" width="52" height="300"/>
      <rect x="1060" y="290" width="52" height="360"/>
    </g>
    <polyline points="526,620 606,565 686,525 766,545 846,465 926,415 1006,375 1086,315"
      fill="none" stroke="#e8e0ce" stroke-width="3"/>
    <text x="1086" y="298" class="mono" font-size="15" fill="#e8e0ce" text-anchor="middle">RÉCORD</text>
  </g>

  <!-- Silla de oficina vacía -->
  <g fill="#e8e0ce">
    <ellipse cx="250" cy="712" rx="120" ry="16" fill="#000" opacity="0.18"/>
    <!-- respaldo -->
    <rect x="300" y="430" width="30" height="150" rx="10" transform="rotate(6 315 505)"/>
    <!-- asiento -->
    <rect x="190" y="560" width="150" height="30" rx="10"/>
    <!-- poste -->
    <rect x="255" y="588" width="14" height="90"/>
    <!-- base + ruedas -->
    <path d="M175 686 L262 660 L349 686" fill="none" stroke="#e8e0ce" stroke-width="10" stroke-linecap="round"/>
    <circle cx="175" cy="694" r="12"/><circle cx="262" cy="694" r="12"/><circle cx="349" cy="694" r="12"/>
  </g>

  <!-- Pie -->
  <text x="70" y="820" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">NUNCA SE GANÓ TANTO · NUNCA SE DESPIDIÓ A TANTOS</text>
</svg>
