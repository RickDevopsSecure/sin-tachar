<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Cuerdas de un instrumento con una rota, sobre una letra censurada">
  <defs><style>.mono{font-family:"Courier New",ui-monospace,monospace;}</style></defs>

  <rect width="1200" height="900" fill="#16140f"/>

  <!-- Encabezado -->
  <text x="70" y="90" class="mono" font-size="17" letter-spacing="3" fill="#8a8377">PALENQUE · CORRIDO · EXPEDIENTE</text>
  <rect x="70" y="108" width="1060" height="1" fill="#8a8377" opacity="0.5"/>

  <!-- Cuerdas (una rota) -->
  <g stroke="#cbc2b0" stroke-width="3" opacity="0.8">
    <line x1="70" y1="230" x2="1130" y2="230"/>
    <line x1="70" y1="300" x2="1130" y2="300"/>
    <!-- cuerda rota (3a) -->
    <path d="M70 370 L520 370 q14 0 8 14 l-10 22" fill="none"/>
    <path d="M1130 370 L640 370 q-14 0 -8 14 l10 22" fill="none"/>
    <line x1="70" y1="440" x2="1130" y2="440"/>
    <line x1="70" y1="510" x2="1130" y2="510"/>
    <line x1="70" y1="580" x2="1130" y2="580"/>
  </g>

  <!-- Letra censurada (recuadro papel) -->
  <rect x="150" y="640" width="900" height="150" fill="#e8e0ce"/>
  <g fill="#33302a">
    <rect x="185" y="672" width="520" height="12" rx="2"/>
    <rect x="185" y="742" width="620" height="12" rx="2"/>
  </g>
  <rect x="183" y="702" width="470" height="20" fill="#141109"/>
  <text x="185" y="668" class="mono" font-size="13" fill="#8a8377">LETRA · FRAGMENTO</text>

  <!-- Sello PROHIBIDO -->
  <g transform="rotate(-8 880 320)">
    <rect x="770" y="286" width="230" height="64" fill="none" stroke="#b5352a" stroke-width="3" rx="3"/>
    <text x="885" y="328" class="mono" font-size="27" letter-spacing="4" fill="#b5352a" text-anchor="middle">PROHIBIDO</text>
  </g>

  <!-- Pie -->
  <text x="150" y="815" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">CALLAR LA CANCIÓN NO CALLA LA VIOLENCIA</text>
</svg>
