<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Bordado sobre manta con la pregunta dónde están, ante un muro de retratos ausentes">
  <defs><style>.mono{font-family:"Courier New",ui-monospace,monospace;}.serif{font-family:Georgia,"Times New Roman",serif;}</style></defs>

  <rect width="1200" height="900" fill="#16140f"/>

  <!-- Muro de retratos ausentes (marcos vacíos) -->
  <g fill="none" stroke="#cbc2b0" stroke-width="2" opacity="0.22">
    <rect x="90" y="140" width="90" height="110"/><rect x="210" y="140" width="90" height="110"/><rect x="330" y="140" width="90" height="110"/><rect x="900" y="140" width="90" height="110"/><rect x="1020" y="140" width="90" height="110"/>
    <rect x="90" y="290" width="90" height="110"/><rect x="1020" y="290" width="90" height="110"/>
    <rect x="90" y="440" width="90" height="110"/><rect x="210" y="440" width="90" height="110"/><rect x="1020" y="440" width="90" height="110"/>
    <rect x="90" y="590" width="90" height="110"/><rect x="900" y="590" width="90" height="110"/><rect x="1020" y="590" width="90" height="110"/>
  </g>

  <!-- Encabezado -->
  <text x="90" y="112" class="mono" font-size="16" letter-spacing="3" fill="#8a8377">MEMORIA VIVA · BORDADO · BUSCADORAS</text>

  <!-- Manta (tela) tendida -->
  <g transform="rotate(-2 600 460)">
    <rect x="300" y="330" width="600" height="270" fill="#e8e0ce"/>
    <!-- deshilachado: ticks en los bordes -->
    <g stroke="#c9bda3" stroke-width="2">
      <line x1="300" y1="345" x2="286" y2="345"/><line x1="300" y1="375" x2="284" y2="375"/><line x1="300" y1="405" x2="288" y2="405"/><line x1="300" y1="435" x2="283" y2="435"/><line x1="300" y1="465" x2="287" y2="465"/>
      <line x1="900" y1="360" x2="915" y2="360"/><line x1="900" y1="400" x2="917" y2="400"/><line x1="900" y1="440" x2="914" y2="440"/><line x1="900" y1="480" x2="916" y2="480"/>
    </g>

    <!-- Texto bordado (contorno tipo puntada) -->
    <text x="600" y="475" class="serif" font-size="86" font-weight="700" text-anchor="middle"
          fill="none" stroke="#2a2620" stroke-width="2.5" stroke-dasharray="7 5" stroke-linecap="round">¿DÓNDE ESTÁN?</text>
    <!-- Puntada de refuerzo bajo el texto -->
    <line x1="360" y1="510" x2="840" y2="510" stroke="#8a2b22" stroke-width="3" stroke-dasharray="10 7"/>
  </g>

  <!-- Aguja e hilo -->
  <g stroke="#cbc2b0" stroke-width="2.5" fill="none">
    <path d="M1000 250 C 940 300, 900 330, 860 372" stroke-dasharray="9 6"/>
    <line x1="1000" y1="250" x2="1035" y2="222"/>
    <ellipse cx="1010" cy="242" rx="6" ry="3" transform="rotate(-38 1010 242)"/>
  </g>

  <!-- Pie -->
  <text x="90" y="820" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">UN NOMBRE PARA QUE NO LO BORRE LA CIFRA</text>
</svg>
