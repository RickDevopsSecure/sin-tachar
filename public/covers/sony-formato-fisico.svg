<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Un disco de videojuego que se disuelve en píxeles digitales">
  <defs><style>.mono{font-family:"Courier New",ui-monospace,monospace;}</style></defs>

  <rect width="1200" height="900" fill="#16140f"/>
  <text x="70" y="92" class="mono" font-size="16" letter-spacing="3" fill="#8a8377">PLAYSTATION · FORMATO FÍSICO · EXPEDIENTE</text>
  <rect x="70" y="110" width="1060" height="1" fill="#8a8377" opacity="0.5"/>

  <!-- Disco óptico -->
  <g fill="none" stroke="#cbc2b0" stroke-width="2" opacity="0.8">
    <circle cx="360" cy="480" r="210"/>
    <circle cx="360" cy="480" r="172" opacity="0.6"/>
    <circle cx="360" cy="480" r="128" opacity="0.5"/>
    <circle cx="360" cy="480" r="84" opacity="0.5"/>
  </g>
  <circle cx="360" cy="480" r="44" fill="#16140f" stroke="#cbc2b0" stroke-width="2"/>
  <!-- brillo -->
  <path d="M250 360 A210 210 0 0 1 470 320" fill="none" stroke="#e8e0ce" stroke-width="3" opacity="0.7"/>

  <!-- Disolución en píxeles (físico → digital) -->
  <g fill="#cbc2b0">
    <rect x="560" y="360" width="20" height="20" opacity="0.5"/><rect x="600" y="440" width="20" height="20" opacity="0.5"/><rect x="600" y="520" width="20" height="20" opacity="0.45"/><rect x="560" y="600" width="20" height="20" opacity="0.4"/>
    <rect x="660" y="400" width="18" height="18" opacity="0.4"/><rect x="680" y="500" width="18" height="18" opacity="0.38"/><rect x="660" y="580" width="18" height="18" opacity="0.32"/>
    <rect x="740" y="360" width="16" height="16" opacity="0.32"/><rect x="760" y="470" width="16" height="16" opacity="0.28"/><rect x="740" y="560" width="16" height="16" opacity="0.24"/>
    <rect x="830" y="420" width="14" height="14" opacity="0.22"/><rect x="850" y="520" width="14" height="14" opacity="0.2"/>
    <rect x="920" y="460" width="12" height="12" opacity="0.16"/><rect x="1000" y="440" width="10" height="10" opacity="0.12"/>
  </g>

  <!-- Sello LICENCIA REVOCABLE -->
  <g transform="rotate(-7 900 250)">
    <rect x="740" y="214" width="320" height="66" fill="none" stroke="#b5352a" stroke-width="3" rx="3"/>
    <text x="900" y="256" class="mono" font-size="24" letter-spacing="2" fill="#b5352a" text-anchor="middle">LICENCIA REVOCABLE</text>
  </g>

  <text x="70" y="820" class="mono" font-size="15" letter-spacing="2" fill="#8a8377">COMPRAR NO ES POSEER · DE DUEÑO A ARRENDATARIO · ENERO 2028</text>
</svg>
